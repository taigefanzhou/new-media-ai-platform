<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>New Media AI Platform</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <aside class="sidebar">
      <div class="brand">
        <div class="mark">AI</div>
        <div>
          <strong>新媒体视频平台</strong>
          <span>内容生产中台</span>
        </div>
      </div>
      <nav>
        <a href="#overview">总览</a>
        <a href="#script">脚本生成</a>
        <a href="#human">数字人</a>
        <a href="#video">视频任务</a>
        <a href="#trending">爆款采集</a>
        <a href="#settings">系统设置</a>
        <a href="#publish">发布准备</a>
      </nav>
    </aside>

    <main>
      <header>
        <div>
          <p class="eyebrow">MVP Console</p>
          <h1>公司短视频生产工作台</h1>
        </div>
        <div class="headerActions">
          <span id="loginState" class="loginState">未登录</span>
          <button id="refreshBtn" class="iconBtn" title="刷新">↻</button>
        </div>
      </header>

      <section id="loginPanel" class="panel loginPanel">
        <h2>账号登录</h2>
        <form id="loginForm" class="inlineForm">
          <label>账号<input name="username" value="admin" /></label>
          <label>密码<input name="password" type="password" value="admin123456" /></label>
          <button type="submit">登录</button>
        </form>
      </section>

      <section id="overview" class="metrics"></section>

      <section class="panel integrationPanel">
        <h2>集成状态</h2>
        <div id="integrationStatus" class="roadmap"></div>
      </section>

      <section class="grid">
        <form id="uploadForm" class="panel">
          <h2>上传素材</h2>
          <label>文件<input name="file" type="file" accept="image/*,video/*" /></label>
          <label>名称<input name="name" placeholder="头像或产品图名称" /></label>
          <label>类型
            <select name="kind">
              <option value="portrait">数字人头像</option>
              <option value="product">产品素材</option>
              <option value="image">图片</option>
              <option value="video">视频</option>
              <option value="reference">参考素材</option>
            </select>
          </label>
          <button type="submit">上传素材</button>
        </form>

        <form id="topicForm" class="panel">
          <h2>选题</h2>
          <label>选题名称<input name="title" value="企业短视频数字人获客" /></label>
          <label>行业<input name="industry" value="B2B服务" /></label>
          <label>目标人群<input name="audience" value="中小企业老板" /></label>
          <button type="submit">创建选题</button>
        </form>

        <form id="scriptForm" class="panel">
          <h2>脚本生成</h2>
          <label>选题内容<textarea name="topic">企业短视频数字人获客</textarea></label>
          <label>平台
            <select name="target_platform">
              <option value="douyin">抖音</option>
              <option value="wechat_channels">视频号</option>
              <option value="xiaohongshu">小红书</option>
            </select>
          </label>
          <label>时长<input name="duration_seconds" type="number" min="15" max="120" value="30" /></label>
          <button type="submit">生成脚本</button>
        </form>

        <form id="humanForm" class="panel">
          <h2>数字人</h2>
          <label>名称<input name="name" value="公司讲解员A" /></label>
          <label>角色<input name="role" value="品牌顾问" /></label>
          <label>头像素材 ID<input name="portrait_material_id" type="number" min="1" placeholder="上传头像后自动填入" /></label>
          <label>风格
            <select name="style">
              <option value="business">商务</option>
              <option value="consultant">顾问</option>
              <option value="cartoon">卡通</option>
            </select>
          </label>
          <button type="submit">创建数字人</button>
        </form>

        <form id="taskForm" class="panel">
          <h2>视频任务</h2>
          <label>脚本 ID<input name="script_id" type="number" min="1" placeholder="生成脚本后自动填入" /></label>
          <label>数字人 ID<input name="digital_human_id" type="number" min="1" placeholder="创建数字人后自动填入" /></label>
          <div class="actions">
            <button type="submit">创建任务</button>
            <button id="runTaskBtn" type="button" class="secondary">运行任务</button>
          </div>
        </form>
      </section>

      <section class="split">
        <div class="panel wide">
          <h2>最新脚本</h2>
          <div id="scriptPreview" class="preview empty">还没有脚本</div>
        </div>
        <div class="panel">
          <h2>任务状态</h2>
          <div id="taskList" class="list"></div>
        </div>
      </section>

      <section id="trending" class="split">
        <form id="trendingSearchForm" class="panel">
          <h2>爆款视频搜索采集</h2>
          <label>平台
            <select name="platform">
              <option value="douyin">抖音</option>
              <option value="wechat_channels">视频号</option>
              <option value="xiaohongshu">小红书</option>
              <option value="kuaishou">快手</option>
            </select>
          </label>
          <label>关键词<input name="keyword" value="数字人获客" /></label>
          <label>分类<input name="category" value="企业服务" /></label>
          <div class="actions">
            <button type="submit">创建采集</button>
            <button id="runTrendingBtn" type="button" class="secondary">运行采集</button>
          </div>
        </form>

        <form id="trendingManualForm" class="panel">
          <h2>手动录入参考视频</h2>
          <label>平台
            <select name="platform">
              <option value="douyin">抖音</option>
              <option value="wechat_channels">视频号</option>
              <option value="xiaohongshu">小红书</option>
              <option value="manual">手动</option>
            </select>
          </label>
          <label>标题<input name="title" placeholder="参考视频标题" /></label>
          <label>链接<input name="source_url" placeholder="https://..." /></label>
          <label>爆点摘要<textarea name="summary" placeholder="只记录选题结构和爆点，不搬运原文"></textarea></label>
          <button type="submit">保存参考</button>
        </form>
      </section>

      <section class="split">
        <div class="panel wide">
          <h2>爆款参考库</h2>
          <div id="trendingVideoList" class="list"></div>
        </div>
        <div class="panel">
          <h2>采集任务</h2>
          <div id="trendingSearchList" class="list"></div>
        </div>
      </section>

      <section id="settings" class="split">
        <form id="modelConfigForm" class="panel">
          <h2>AI 模型入口维护</h2>
          <label>名称<input name="name" value="脚本生成模型" /></label>
          <label>用途
            <select name="purpose">
              <option value="script">脚本生成</option>
              <option value="tts">语音合成</option>
              <option value="video">视频生成</option>
              <option value="compliance">合规检查</option>
            </select>
          </label>
          <label>供应商<input name="provider" value="openai-compatible" /></label>
          <label>接口地址<input name="api_base" placeholder="https://api.example.com/v1" /></label>
          <label>模型名<input name="model_name" placeholder="gpt-4.1-mini / deepseek-chat" /></label>
          <label>API Key<input name="api_key" type="password" placeholder="保存后不会展示明文" /></label>
          <label class="checkLine"><input name="is_active" type="checkbox" checked /> 设为启用</label>
          <button type="submit">保存模型配置</button>
        </form>
        <div class="panel">
          <h2>模型配置列表</h2>
          <div id="modelConfigList" class="list"></div>
        </div>
      </section>

      <section id="publish" class="panel footerPanel">
        <h2>下一步接入</h2>
        <div class="roadmap">
          <span>真实脚本模型</span>
          <span>CosyVoice 配音</span>
          <span>SadTalker/MuseTalk 数字人</span>
          <span>Seedance 镜头生成</span>
          <span>FFmpeg 成片合成</span>
        </div>
      </section>
    </main>

    <div id="toast"></div>
    <script src="/app.js"></script>
  </body>
</html>
