services:
  platform-api:
    build:
      context: ../backend
    env_file:
      - ../backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ../backend/data:/app/data

  remotion-renderer:
    image: ${REMOTION_RENDERER_IMAGE:-new-media-remotion-renderer:dev}
    build:
      context: ../services/remotion-renderer
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ../backend/data:/app/data

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    profiles: ["workflow"]
    ports:
      - "5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n

  comfyui:
    image: yanwk/comfyui-boot:cu124
    profiles: ["gpu"]
    ports:
      - "8188:8188"
    volumes:
      - comfyui-data:/root
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  minio-data:
  n8n-data:
  comfyui-data:
